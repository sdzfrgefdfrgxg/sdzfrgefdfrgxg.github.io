<head>
<meta charset="UTF-8">
<title>Rivals Config</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0d0c;
    --surface: #181716;
    --surface-2: #1f1e1c;
    --surface-3: #272523;
    --border: #2a2825;
    --border-hover: #3d3a35;
    --primary: #d4a853;
    --primary-dim: rgba(212, 168, 83, 0.08);
    --primary-glow: rgba(212, 168, 83, 0.15);
    --text: #ece7de;
    --text-muted: #7a7570;
    --text-dim: #4a4742;
    --radius: 6px;
    --radius-lg: 10px;
    --shadow: 0 8px 32px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.3);
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

  /* ─── Top bar ─── */
  .topbar {
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(14, 13, 12, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    z-index: 100;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    width: 6px;
    height: 6px;
    background: var(--primary);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(212, 168, 83, 0.4);
  }

  .title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .count-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: 20px;
    transition: all var(--transition);
  }

  .count-badge.active {
    color: var(--primary);
    border-color: rgba(212, 168, 83, 0.25);
    background: var(--primary-dim);
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn {
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 7px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border-radius: var(--radius);
    transition: all var(--transition);
  }

  .btn:hover {
    border-color: var(--border-hover);
    background: var(--surface-2);
    color: var(--text);
  }

  .btn-primary {
    background: var(--primary);
    color: #0e0d0c;
    border-color: var(--primary);
    font-weight: 600;
  }

  .btn-primary:hover {
    background: #ddb95e;
    border-color: #ddb95e;
    box-shadow: 0 0 20px rgba(212, 168, 83, 0.2);
  }

  #msg {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--primary);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  #msg.show { opacity: 1; }

  /* ─── Main ─── */
  .main { padding: 24px 28px 60px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    align-items: start;
  }

  /* ─── Column ─── */
  .col {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: visible;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  .col:nth-child(1) { animation-delay: 0.04s; }
  .col:nth-child(2) { animation-delay: 0.08s; }
  .col:nth-child(3) { animation-delay: 0.12s; }
  .col:nth-child(4) { animation-delay: 0.16s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .col-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .col-header .cat-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    margin-left: auto;
    opacity: 0;
    transition: opacity var(--transition);
  }

  .col-header .cat-count.visible {
    opacity: 1;
    color: var(--primary);
  }

  .col-body {
    display: flex;
    flex-direction: column;
  }

  /* ─── Weapon Row ─── */
  .weapon-row {
    padding: 8px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    border-bottom: 1px solid rgba(42, 40, 37, 0.5);
    position: relative;
    transition: background var(--transition);
  }

  .weapon-row:last-child { border-bottom: none; }
  .weapon-row:hover { background: rgba(255, 255, 255, 0.015); }
  .weapon-row.selected { background: var(--primary-dim); }

  .weapon-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color var(--transition);
    user-select: none;
  }

  .weapon-row.selected .weapon-label {
    color: var(--primary);
  }

  /* ─── Custom Dropdown ─── */
  .dropdown {
    position: relative;
    width: 100%;
  }

  .dropdown-trigger {
    width: 100%;
    display: flex;
    align-items: center;
    padding: 3px 0;
    cursor: pointer;
    border-bottom: 1px solid transparent;
    transition: border-color var(--transition);
    gap: 10px;
  }

  .dropdown-trigger:hover {
    border-bottom-color: var(--border-hover);
  }

  .dropdown-trigger .trigger-icon {
    width: 30px;
    height: 30px;
    border-radius: 5px;
    overflow: hidden;
    flex-shrink: 0;
    background: #c8c8c8;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .dropdown-trigger .trigger-icon img {
    width: 140%;
    height: 140%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  .dropdown-trigger .value {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }

  .dropdown-trigger .placeholder {
    color: var(--text-dim);
  }

  .dropdown-trigger .arrow {
    flex-shrink: 0;
    width: 14px;
    height: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .dropdown-trigger .arrow svg {
    width: 10px;
    height: 10px;
    fill: var(--text-dim);
    transition: fill var(--transition);
  }

  .dropdown.open .dropdown-trigger {
    border-bottom-color: var(--primary);
  }

  .dropdown.open .dropdown-trigger .arrow {
    transform: rotate(180deg);
  }

  .dropdown.open .dropdown-trigger .arrow svg {
    fill: var(--primary);
  }

  /* ─── Dropdown Menu ─── */
  .dropdown-menu {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--surface-3);
    border: 1px solid var(--border-hover);
    border-radius: var(--radius);
    z-index: 200;
    box-shadow: var(--shadow);
    overflow: hidden;
    opacity: 0;
    transform: translateY(-6px) scale(0.98);
    pointer-events: none;
    transition: opacity 0.18s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .dropdown.open .dropdown-menu {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  .dropdown-menu-inner {
    max-height: 280px;
    overflow-y: auto;
    padding: 4px;
  }

  .dropdown-item {
    padding: 5px 8px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.12s ease;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dropdown-item:hover {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text);
  }

  .dropdown-item.active {
    background: var(--primary-dim);
    color: var(--primary);
  }

  .dropdown-item .item-icon {
    width: 36px;
    height: 36px;
    border-radius: 5px;
    overflow: hidden;
    flex-shrink: 0;
    background: #c8c8c8;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .dropdown-item .item-icon img {
    width: 140%;
    height: 140%;
    object-fit: cover;
    object-position: center;
    display: block;
    transition: transform 0.15s ease;
  }

  .dropdown-item:hover .item-icon img {
    transform: scale(1.08);
  }

  .dropdown-item .item-name {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .dropdown-item.default-item {
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    border-radius: 4px 4px 0 0;
    margin-bottom: 2px;
  }

  .dropdown-item.default-item:hover {
    color: var(--text-muted);
    background: rgba(255, 255, 255, 0.03);
  }

  /* ─── Responsive ─── */
  @media (max-width: 1100px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 580px) {
    .grid { grid-template-columns: 1fr; }
    .topbar { padding: 0 16px; }
    .main { padding: 16px 16px 40px; }
  }

/* ─── Config Preview ─── */
.preview{
  margin-top:28px;
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  background:var(--surface);
  overflow:hidden;
}
.preview-header{
  padding:10px 14px;
  border-bottom:1px solid var(--border);
  font-size:10px;
  font-weight:600;
  color:var(--text-dim);
  letter-spacing:.1em;
  text-transform:uppercase;
  display:flex;
  align-items:center;
}
.preview-header button{
  margin-left:auto;
  font-size:11px;
  padding:5px 12px;
}
.preview-body{
  padding:14px;
  font-family:'JetBrains Mono', monospace;
  font-size:11px;
  color:var(--text-muted);
  min-height:60px;
  white-space:pre-wrap;
}
.preview-empty{
  color:var(--text-dim);
  font-style:italic;
}

</style>
</head>

const cfg = {};
const thumbCache = {};

// ─── Fetch thumbnails from Roblox in batches ───
// Roblox thumbnails API blocks CORS, so we use roproxy.com as a proxy
// with a fallback to robloxproxy.com
const THUMB_ENDPOINTS = [
  'https://thumbnails.roproxy.com/v1/assets',
  'https://thumbnails.robloxproxy.com/v1/assets'
];

async function tryFetchBatch(batch) {
  const params = `?assetIds=${batch.join(',')}&returnPolicy=PlaceHolder&size=420x420&format=Png&isCircular=false`;
  for (const endpoint of THUMB_ENDPOINTS) {
    try {
      const res = await fetch(endpoint + params);
      if (!res.ok) continue;
      const json = await res.json();
      if (json.data) {
        json.data.forEach(item => {
          if (item.imageUrl) thumbCache[item.targetId] = item.imageUrl;
        });
        return true;
      }
    } catch(e) {
      console.warn(`Proxy ${endpoint} failed:`, e.message);
    }
  }
  return false;
}

async function fetchThumbnails(assetIds) {
  const uncached = assetIds.filter(id => id && id > 0 && !thumbCache[id]);
  if (!uncached.length) return;

  const batchSize = 100;
  const promises = [];
  for (let i = 0; i < uncached.length; i += batchSize) {
    const batch = uncached.slice(i, i + batchSize);
    promises.push(tryFetchBatch(batch));
  }
  await Promise.all(promises);
}

function getThumbUrl(assetId) {
  return thumbCache[assetId] || '';
}

function setIconEl(el, assetId) {
  if (!el || !assetId) return;
  const url = getThumbUrl(assetId);
  if (url) {
    el.innerHTML = `<img src="${url}" loading="lazy" alt="">`;
  }
}

// Apply all thumbnails to DOM after fetch
function applyThumbnails() {
  document.querySelectorAll('[data-asset-id]').forEach(el => {
    const id = el.dataset.assetId;
    if (id && thumbCache[id] && !el.querySelector('img')) {
      el.innerHTML = `<img src="${thumbCache[id]}" loading="lazy" alt="">`;
    }
  });
}

async function loadAllThumbnails() {
  const allIds = new Set();
  for (const weapon in ICONS) {
    for (const skin in ICONS[weapon]) {
      const id = ICONS[weapon][skin];
      if (id > 0) allIds.add(id);
    }
  }
  await fetchThumbnails([...allIds]);
  applyThumbnails();
}

// ─── Dropdown logic ───
let openDropdown = null;
document.addEventListener('click', (e) => {
  if (openDropdown && !openDropdown.contains(e.target)) {
    openDropdown.classList.remove('open');
    openDropdown = null;
  }
});

function showMsg(text) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.classList.add('show');
  setTimeout(() => m.classList.remove('show'), 2500);
}

function upd(){
  const n = Object.keys(cfg).length;
  const badge = document.getElementById('c');
  badge.textContent = n + ' selected';
  badge.classList.toggle('active', n > 0);

  document.querySelectorAll('.weapon-row').forEach(row => {
    const dd = row.querySelector('.dropdown');
    row.classList.toggle('selected', !!(dd && dd.dataset.value));
  });

  C.forEach(([cat, ws]) => {
    const weapons = ws.split(',');
    const count = weapons.filter(w => cfg[w]).length;
    const el = document.querySelector(`.cat-count[data-cat="${cat}"]`);
    if (el) {
      el.textContent = count + '/' + weapons.length;
      el.classList.toggle('visible', count > 0);
    }
  });
  updatePreview();
}

function getAssetId(weapon, skinName) {
  return ICONS[weapon]?.[skinName] || null;
}

function getDefaultAssetId(weapon) {
  return ICONS[weapon]?.["Standard"] || null;
}

function createDropdown(weapon, skins) {
  const dd = document.createElement('div');
  dd.className = 'dropdown';
  dd.dataset.weapon = weapon;
  dd.dataset.value = '';

  const defAsset = getDefaultAssetId(weapon);

  const trigger = document.createElement('div');
  trigger.className = 'dropdown-trigger';
  trigger.innerHTML = `
    <span class="trigger-icon"${defAsset ? ` data-asset-id="${defAsset}"` : ''}></span>
    <span class="value placeholder">Default</span>
    <span class="arrow"><svg viewBox="0 0 10 6"><path d="M0 0l5 6 5-6z"/></svg></span>
  `;

  const menu = document.createElement('div');
  menu.className = 'dropdown-menu';
  const inner = document.createElement('div');
  inner.className = 'dropdown-menu-inner';

  // Default option
  const defItem = document.createElement('div');
  defItem.className = 'dropdown-item default-item';
  defItem.innerHTML = `<span class="item-icon"${defAsset ? ` data-asset-id="${defAsset}"` : ''}></span><span class="item-name">Default</span>`;
  defItem.addEventListener('click', (e) => {
    e.stopPropagation();
    selectSkin(dd, weapon, null, defAsset);
  });
  inner.appendChild(defItem);

  skins.forEach(skin => {
    const aid = getAssetId(weapon, skin);
    const item = document.createElement('div');
    item.className = 'dropdown-item';
    item.dataset.skin = skin;
    item.innerHTML = `<span class="item-icon"${aid ? ` data-asset-id="${aid}"` : ''}></span><span class="item-name">${skin}</span>`;
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      selectSkin(dd, weapon, skin, aid);
    });
    inner.appendChild(item);
  });

  menu.appendChild(inner);
  dd.appendChild(trigger);
  dd.appendChild(menu);

  trigger.addEventListener('click', (e) => {
    e.stopPropagation();
    const wasOpen = dd.classList.contains('open');
    if (openDropdown && openDropdown !== dd) openDropdown.classList.remove('open');

    if (wasOpen) {
      dd.classList.remove('open');
      openDropdown = null;
    } else {
      dd.classList.add('open');
      openDropdown = dd;
      requestAnimationFrame(() => {
        const act = inner.querySelector('.dropdown-item.active');
        if (act) act.scrollIntoView({ block: 'nearest' });
      });
    }
  });

  return dd;
}

function selectSkin(dd, weapon, skin, assetId) {
  const trigger = dd.querySelector('.dropdown-trigger');
  const trigIcon = trigger.querySelector('.trigger-icon');
  const valEl = trigger.querySelector('.value');

  if (skin) {
    dd.dataset.value = skin;
    valEl.textContent = skin;
    valEl.classList.remove('placeholder');
    cfg[weapon] = skin;
    if (assetId) {
      trigIcon.dataset.assetId = assetId;
      setIconEl(trigIcon, assetId);
    }
  } else {
    dd.dataset.value = '';
    valEl.textContent = 'Default';
    valEl.classList.add('placeholder');
    delete cfg[weapon];
    const defId = getDefaultAssetId(weapon);
    if (defId) {
      trigIcon.dataset.assetId = defId;
      setIconEl(trigIcon, defId);
    }
  }

  dd.querySelectorAll('.dropdown-item').forEach(i => i.classList.remove('active'));
  if (skin) {
    const match = dd.querySelector(`.dropdown-item[data-skin="${CSS.escape(skin)}"]`);
    if (match) match.classList.add('active');
  }

  dd.classList.remove('open');
  openDropdown = null;
  upd();
}

// ─── Build grid ───
const g = document.getElementById('g');
C.forEach(([cat, ws]) => {
  const col = document.createElement('div');
  col.className = 'col';
  col.innerHTML = `<div class="col-header">${cat}<span class="cat-count" data-cat="${cat}"></span></div>`;
  const body = document.createElement('div');
  body.className = 'col-body';

  ws.split(',').forEach(w => {
    if (!S[w]) return;
    const skins = S[w].split(',');
    const row = document.createElement('div');
    row.className = 'weapon-row';
    const label = document.createElement('div');
    label.className = 'weapon-label';
    label.textContent = w;
    row.appendChild(label);
    row.appendChild(createDropdown(w, skins));
    body.appendChild(row);
  });

  col.appendChild(body);
  g.appendChild(col);
});

// Set dropdown value programmatically (for import)
function setDropdownValue(weapon, skin) {
  const dd = document.querySelector(`.dropdown[data-weapon="${weapon}"]`);
  if (!dd) return;
  const aid = getAssetId(weapon, skin);
  selectSkin(dd, weapon, skin, aid);
}

function dl() {
  if (!Object.keys(cfg).length) { showMsg('No skins selected.'); return; }
  let s = '';
  for (const [w, v] of Object.entries(cfg)) s += w + '=' + v + '\n';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([s]));
  a.download = 'rivals_config.lua';
  a.click();
}

function imp() {
  const i = document.createElement('input');
  i.type = 'file';
  i.accept = '.lua,.txt';
  i.onchange = e => {
    const r = new FileReader();
    r.onload = v => {
      // Reset all
      Object.keys(cfg).forEach(k => delete cfg[k]);
      document.querySelectorAll('.dropdown').forEach(dd => {
        const weapon = dd.dataset.weapon;
        selectSkin(dd, weapon, null, getDefaultAssetId(weapon));
      });

      const t = v.target.result;
      for (const line of t.split('\n')) {
        const eq = line.indexOf('=');
        if (eq > 0) {
          const w = line.slice(0, eq).trim(), s = line.slice(eq + 1).trim();
          if (S[w] && s) setDropdownValue(w, s);
        }
      }
      for (const m of t.matchAll(/\["([^"]+)"\]\s*=\s*"([^"]+)"/g)) {
        if (S[m[1]]) setDropdownValue(m[1], m[2]);
      }
      upd();
      showMsg('Imported ' + Object.keys(cfg).length + ' skins.');
    };
    r.readAsText(e.target.files[0]);
  };
  i.click();
}

// ─── Load thumbnails ───
loadAllThumbnails();


function updatePreview(){
  const el=document.getElementById("preview");
  if(!el) return;

  if(!Object.keys(cfg).length){
    el.innerHTML='<span class="preview-empty">No skins selected yet.</span>';
    return;
  }

  let t="";
  for(const [w,v] of Object.entries(cfg)){
    t+=w+"="+v+"\n";
  }
  el.textContent=t.trim();
}

function copyPreview(){
  const el=document.getElementById("preview");
  if(!el) return;
  navigator.clipboard.writeText(el.textContent);
}
